# one command to bring up the whole stack: sql server, rabbitmq, the api and
# the frontend. the api waits for sql server and rabbitmq to report healthy
# before it starts, then runs its ef migrations (which seed the lookups) on
# startup.
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: threes-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_Pass123"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" -b -o /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: threes-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    build:
      context: ./backend
    container_name: threes-api
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__RegistrationDatabase: "Server=sqlserver,1433;Database=ThreesRegistration;User Id=sa;Password=Your_strong_Pass123;TrustServerCertificate=True;Encrypt=False"
      Messaging__UseInMemory: "false"
      Messaging__Host: "rabbitmq"
      Messaging__Username: "guest"
      Messaging__Password: "guest"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  frontend:
    build:
      context: ./frontend
    container_name: threes-frontend
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  sqlserver-data:
